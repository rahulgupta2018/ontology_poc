<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Architecture Q&A</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0f1117;
    --surface:  #1a1d27;
    --border:   #2a2d3a;
    --user-bg:  #2563eb;
    --bot-bg:   #1e2130;
    --accent:   #60a5fa;
    --muted:    #6b7280;
    --text:     #e2e8f0;
    --code-bg:  #0d1117;
    --green:    #34d399;
    --yellow:   #fbbf24;
    --radius:   12px;
    --font:     'Inter', system-ui, sans-serif;
    --mono:     'JetBrains Mono', 'Fira Code', monospace;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    height: 100dvh;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }

  .logo {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, #3b82f6, #8b5cf6);
    border-radius: 10px;
    display: grid; place-items: center;
    font-size: 18px;
  }

  header h1 { font-size: 1rem; font-weight: 600; }
  header p  { font-size: 0.75rem; color: var(--muted); margin-top: 1px; }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--green);
    margin-left: auto;
    box-shadow: 0 0 6px var(--green);
    flex-shrink: 0;
  }
  .status-dot.loading { background: var(--yellow); box-shadow: 0 0 6px var(--yellow); }

  /* ── Chat area ── */
  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    scroll-behavior: smooth;
  }

  /* ── Welcome screen ── */
  #welcome {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 32px;
    height: 100%;
    text-align: center;
  }

  #welcome h2 { font-size: 1.5rem; font-weight: 700; }
  #welcome p  { color: var(--muted); font-size: 0.9rem; max-width: 400px; line-height: 1.6; }

  .examples-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 10px;
    width: 100%;
    max-width: 700px;
  }

  .example-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 16px;
    color: var(--text);
    font-size: 0.8rem;
    cursor: pointer;
    text-align: left;
    line-height: 1.4;
    transition: border-color 0.15s, background 0.15s;
  }

  .example-btn:hover {
    border-color: var(--accent);
    background: #1e2a3a;
  }

  /* ── Messages ── */
  .msg {
    display: flex;
    gap: 12px;
    max-width: 800px;
    width: 100%;
  }

  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg.bot  { align-self: flex-start; }

  .avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    display: grid; place-items: center;
    font-size: 14px;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .msg.user .avatar { background: var(--user-bg); }
  .msg.bot  .avatar { background: #312e81; }

  .bubble {
    padding: 12px 16px;
    border-radius: var(--radius);
    font-size: 0.875rem;
    line-height: 1.6;
    max-width: calc(100% - 44px);
  }

  .msg.user .bubble {
    background: var(--user-bg);
    border-bottom-right-radius: 4px;
  }

  .msg.bot .bubble {
    background: var(--bot-bg);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
  }

  /* ── Cypher block inside bot bubble ── */
  .cypher-block {
    margin-top: 10px;
    border-radius: 8px;
    overflow: hidden;
    font-size: 0.78rem;
  }

  .cypher-label {
    background: #161b22;
    color: var(--muted);
    padding: 4px 10px;
    font-family: var(--mono);
    font-size: 0.7rem;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .cypher-label.retry { color: var(--yellow); }

  .cypher-code {
    background: var(--code-bg);
    color: #7ee787;
    padding: 10px 12px;
    font-family: var(--mono);
    white-space: pre-wrap;
    word-break: break-all;
    border: 1px solid #30363d;
    border-top: none;
  }

  .results-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    margin-top: 8px;
    background: #0d2f1e;
    border: 1px solid #166534;
    color: var(--green);
    font-size: 0.72rem;
    padding: 2px 8px;
    border-radius: 20px;
    font-family: var(--mono);
  }

  .answer-text {
    margin-top: 10px;
    color: var(--text);
    line-height: 1.7;
  }

  /* ── Thinking indicator ── */
  .thinking {
    display: flex;
    gap: 4px;
    align-items: center;
    padding: 4px 0;
  }

  .thinking span {
    width: 6px; height: 6px;
    background: var(--muted);
    border-radius: 50%;
    animation: bounce 1.2s infinite ease-in-out;
  }
  .thinking span:nth-child(2) { animation-delay: 0.15s; }
  .thinking span:nth-child(3) { animation-delay: 0.3s; }

  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
    40%            { transform: translateY(-5px); opacity: 1; }
  }

  /* ── Input area ── */
  #input-area {
    padding: 16px 24px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }

  #form {
    display: flex;
    gap: 10px;
    max-width: 800px;
    margin: 0 auto;
  }

  #question {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 16px;
    color: var(--text);
    font-size: 0.875rem;
    font-family: var(--font);
    resize: none;
    outline: none;
    transition: border-color 0.15s;
    line-height: 1.5;
    max-height: 140px;
    overflow-y: auto;
  }

  #question:focus { border-color: var(--accent); }
  #question::placeholder { color: var(--muted); }

  #send-btn {
    width: 44px; height: 44px;
    background: var(--user-bg);
    border: none;
    border-radius: var(--radius);
    color: white;
    cursor: pointer;
    display: grid; place-items: center;
    flex-shrink: 0;
    align-self: flex-end;
    transition: opacity 0.15s, transform 0.1s;
  }

  #send-btn:hover:not(:disabled) { opacity: 0.85; }
  #send-btn:active:not(:disabled) { transform: scale(0.95); }
  #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  #send-btn svg { width: 18px; height: 18px; }

  .hint { font-size: 0.7rem; color: var(--muted); text-align: center; margin-top: 8px; }
</style>
</head>
<body>

<header>
  <div class="logo">🏗️</div>
  <div>
    <h1>Architecture Q&amp;A</h1>
    <p>Neo4j · Ollama · LangChain</p>
  </div>
  <div class="status-dot" id="status-dot"></div>
</header>

<div id="chat">
  <div id="welcome">
    <div>
      <h2>Ask about your architecture</h2>
      <p>Query the knowledge graph in plain English. The AI translates your question into Cypher and answers from Neo4j.</p>
    </div>
    <div class="examples-grid" id="examples-grid">
      <!-- populated by JS -->
    </div>
  </div>
</div>

<div id="input-area">
  <form id="form">
    <textarea
      id="question"
      rows="1"
      placeholder="Ask about your architecture… (Enter to send, Shift+Enter for newline)"
      autocomplete="off"
    ></textarea>
    <button type="submit" id="send-btn" title="Send">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
           stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 2L11 13M22 2L15 22l-4-9-9-4 20-7z"/>
      </svg>
    </button>
  </form>
  <p class="hint">Enter to send · Shift+Enter for new line</p>
</div>

<script>
const chat      = document.getElementById('chat');
const welcome   = document.getElementById('welcome');
const form      = document.getElementById('form');
const textarea  = document.getElementById('question');
const sendBtn   = document.getElementById('send-btn');
const statusDot = document.getElementById('status-dot');

// ── Auto-grow textarea ────────────────────────────────────────────────────────
textarea.addEventListener('input', () => {
  textarea.style.height = 'auto';
  textarea.style.height = Math.min(textarea.scrollHeight, 140) + 'px';
});

// ── Enter to submit ───────────────────────────────────────────────────────────
textarea.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    form.requestSubmit();
  }
});

// ── Load examples ─────────────────────────────────────────────────────────────
async function loadExamples() {
  try {
    const r = await fetch('/examples');
    const { examples } = await r.json();
    const grid = document.getElementById('examples-grid');
    examples.forEach(q => {
      const btn = document.createElement('button');
      btn.className = 'example-btn';
      btn.textContent = q;
      btn.addEventListener('click', () => sendQuestion(q));
      grid.appendChild(btn);
    });
  } catch (e) {
    console.warn('Could not load examples', e);
  }
}

// ── DOM helpers ───────────────────────────────────────────────────────────────
function hideWelcome() {
  if (welcome && welcome.parentNode) {
    welcome.remove();
  }
}

function appendMsg(role, content = '') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;

  const avatar = document.createElement('div');
  avatar.className = 'avatar';
  avatar.textContent = role === 'user' ? '👤' : '🤖';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  if (content) bubble.textContent = content;

  div.appendChild(avatar);
  div.appendChild(bubble);
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return bubble;
}

function showThinking(bubble) {
  const t = document.createElement('div');
  t.className = 'thinking';
  t.innerHTML = '<span></span><span></span><span></span>';
  bubble.appendChild(t);
  return t;
}

function renderCypherBlock(bubble, label, cypher, isRetry = false) {
  const wrap = document.createElement('div');
  wrap.className = 'cypher-block';

  const lbl = document.createElement('div');
  lbl.className = `cypher-label${isRetry ? ' retry' : ''}`;
  lbl.innerHTML = `${isRetry ? '⚠️ Self-corrected Cypher' : '⚙️ Generated Cypher'}`;

  const code = document.createElement('div');
  code.className = 'cypher-code';
  code.textContent = cypher;

  wrap.appendChild(lbl);
  wrap.appendChild(code);
  bubble.appendChild(wrap);
}

function renderResultsBadge(bubble, count) {
  const badge = document.createElement('div');
  badge.className = 'results-badge';
  badge.innerHTML = `✓ ${count} row${count !== '1' ? 's' : ''} from Neo4j`;
  bubble.appendChild(badge);
}

function renderAnswer(bubble, text) {
  const p = document.createElement('div');
  p.className = 'answer-text';
  p.textContent = text;
  bubble.appendChild(p);
}

// ── Send a question ────────────────────────────────────────────────────────────
async function sendQuestion(q) {
  if (!q.trim()) return;
  hideWelcome();

  sendBtn.disabled = true;
  statusDot.classList.add('loading');
  textarea.value = '';
  textarea.style.height = 'auto';

  appendMsg('user', q);

  const botBubble = appendMsg('bot');
  const thinking  = showThinking(botBubble);

  try {
    const resp = await fetch('/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question: q }),
    });

    if (!resp.ok) {
      thinking.remove();
      renderAnswer(botBubble, `Error: ${resp.statusText}`);
      return;
    }

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';
    let firstEvent = true;

    while (true) {
      const { value, done } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });

      // Parse SSE lines
      const lines = buf.split('\n\n');
      buf = lines.pop(); // keep incomplete chunk

      for (const chunk of lines) {
        const line = chunk.trim();
        if (!line.startsWith('data:')) continue;
        const payload = JSON.parse(line.slice(5).trim());

        if (firstEvent) {
          thinking.remove();
          firstEvent = false;
        }

        const { event, data } = payload;

        if (event === 'cypher' && data) {
          renderCypherBlock(botBubble, 'Generated Cypher', data, false);
        } else if (event === 'retry' && data) {
          renderCypherBlock(botBubble, 'Self-corrected Cypher', data, true);
        } else if (event === 'results_count') {
          renderResultsBadge(botBubble, data);
        } else if (event === 'answer') {
          renderAnswer(botBubble, data);
        }
      }

      chat.scrollTop = chat.scrollHeight;
    }
  } catch (err) {
    thinking.remove();
    renderAnswer(botBubble, `Connection error: ${err.message}`);
  } finally {
    sendBtn.disabled = false;
    statusDot.classList.remove('loading');
    textarea.focus();
    chat.scrollTop = chat.scrollHeight;
  }
}

// ── Form submit ───────────────────────────────────────────────────────────────
form.addEventListener('submit', e => {
  e.preventDefault();
  sendQuestion(textarea.value.trim());
});

// ── Init ──────────────────────────────────────────────────────────────────────
loadExamples();
textarea.focus();
</script>
</body>
</html>
